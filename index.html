<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In & Dashboard</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            padding: 20px;
            background-color: #f0f2f5;
        }

        h1 { font-weight: 700; margin: 0; font-size: 28px; }
        p { font-size: 15px; font-weight: 300; line-height: 24px; letter-spacing: 0.5px; margin: 20px 0; }
        span { font-size: 13px; color: #666; margin-bottom: 10px; }
        a { color: #667eea; font-size: 14px; text-decoration: none; margin: 15px 0; transition: color 0.3s ease; }

        button {
            border-radius: 25px;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #FFFFFF;
            font-size: 13px;
            font-weight: 600;
            padding: 14px 50px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            margin-top: 10px;
        }

        button.transparent-btn { background: transparent; border: 2px solid #FFFFFF; box-shadow: none; }

        form {
            background-color: #FFFFFF;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 0 50px;
            height: 100%;
            text-align: center;
        }

        input {
            background-color: #f3f4f6;
            border: 2px solid transparent;
            border-radius: 12px;
            padding: 14px 18px;
            margin: 8px 0;
            width: 100%;
            font-size: 14px;
        }

        /* Authentication Wrapper Styles */
        .auth-wrapper {
            background-color: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
            width: 850px;
            max-width: 100%;
            min-height: 550px;
            display: block; /* Default state */
        }

        .auth-form-box { position: absolute; top: 0; height: 100%; transition: all 0.6s ease-in-out; }
        .login-form-box { left: 0; width: 50%; z-index: 2; }
        .auth-wrapper.panel-active .login-form-box { transform: translateX(100%); }
        .register-form-box { left: 0; width: 50%; opacity: 0; z-index: 1; }
        .auth-wrapper.panel-active .register-form-box { transform: translateX(100%); opacity: 1; z-index: 5; animation: show 0.6s; }

        @keyframes show {
            0%, 49.99% { opacity: 0; z-index: 1; }
            50%, 100% { opacity: 1; z-index: 5; }
        }

        .slide-panel-wrapper {
            position: absolute; top: 0; left: 50%; width: 50%; height: 100%;
            overflow: hidden; transition: transform 0.6s ease-in-out; z-index: 100;
        }
        .auth-wrapper.panel-active .slide-panel-wrapper { transform: translateX(-100%); }
        .slide-panel {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #FFFFFF; position: relative; left: -100%; height: 100%; width: 200%;
            transform: translateX(0); transition: transform 0.6s ease-in-out;
        }
        .auth-wrapper.panel-active .slide-panel { transform: translateX(50%); }
        .panel-content {
            position: absolute; display: flex; align-items: center; justify-content: center;
            flex-direction: column; padding: 0 50px; text-align: center; top: 0; height: 100%; width: 50%;
        }
        .panel-content-right { right: 0; }
        .social-links { margin: 15px 0; display: flex; flex-direction: column; align-items: center; gap: 10px; }

        /* DASHBOARD STYLES */
        #dashboardWrapper {
            display: none; /* Hidden by default */
            background-color: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            width: 500px;
            max-width: 100%;
            padding: 40px;
            text-align: center;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #667eea;
            margin: 20px auto;
            object-fit: cover;
        }

        #dashboardEmail {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .auth-wrapper { min-height: auto; width: 100%; }
            .auth-form-box { position: static !important; width: 100% !important; }
            .register-form-box { display: none; }
            .auth-wrapper.panel-active .login-form-box { display: none; }
            .auth-wrapper.panel-active .register-form-box { display: block; }
            .slide-panel-wrapper { display: none !important; }
            .mobile-switch { display: block; margin-top: 20px; }
        }
    </style>
</head>

<body>
    <div id="g_id_onload"
         data-client_id="318717217301-kot0gq3l7amhtfphhvsbjh4ehau9heb4.apps.googleusercontent.com"
         data-context="signin"
         data-ux_mode="popup"
         data-callback="handleCredentialResponse"
         data-auto_prompt="false">
    </div>

    <div class="auth-wrapper" id="authWrapper">
        <div class="auth-form-box register-form-box">
            <form action="#" onsubmit="return false;">
                <h1>Create Account</h1>
                <div class="social-links">
                    <div class="g_id_signin" data-type="standard"></div>
                </div>
                <span>or use your email for registration</span>
                <input type="text" placeholder="Full Name" required />
                <input type="email" placeholder="Email Address" required />
                <input type="password" placeholder="Password" required />
                <button type="submit">Sign Up</button>
            </form>
        </div>

        <div class="auth-form-box login-form-box">
            <form action="#" onsubmit="return false;">
                <h1>Sign In</h1>
                <div class="social-links">
                    <div class="g_id_signin" data-type="standard"></div>
                </div>
                <span>or use your account</span>
                <input type="email" placeholder="Email Address" required />
                <input type="password" placeholder="Password" required />
                <a href="#">Forgot your password?</a>
                <button type="submit">Sign In</button>
            </form>
        </div>

        <div class="slide-panel-wrapper">
            <div class="slide-panel">
                <div class="panel-content panel-content-left">
                    <h1>Welcome Back!</h1>
                    <p>Stay connected by logging in with your credentials</p>
                    <button class="transparent-btn" id="loginBtn">Sign In</button>
                </div>
                <div class="panel-content panel-content-right">
                    <h1>Hey There!</h1>
                    <p>Begin your amazing journey by creating an account today</p>
                    <button class="transparent-btn" id="registerBtn">Sign Up</button>
                </div>
            </div>
        </div>
    </div>

    <div id="dashboardWrapper">
        <h1>Welcome to your Dashboard!</h1>
        <img id="dashboardImg" src="" alt="Profile Image" class="profile-img">
        <h2 id="dashboardName">User Name</h2>
        <p id="dashboardEmail">user@email.com</p>
        <button id="signOutBtn">Sign Out</button>
    </div>

    <script>
        // 1. Handle Google Login Success
        function handleCredentialResponse(response) {
            // Decode the JWT token
            const payload = parseJwt(response.credential);
            
            // Populate the Dashboard with Google Data
            document.getElementById('dashboardName').innerText = payload.name;
            document.getElementById('dashboardEmail').innerText = payload.email;
            document.getElementById('dashboardImg').src = payload.picture;

            // Switch the UI View (Hide Auth, Show Dashboard)
            document.getElementById('authWrapper').style.display = 'none';
            document.getElementById('dashboardWrapper').style.display = 'block';
        }

        // 2. Handle Sign Out
        document.getElementById('signOutBtn').addEventListener('click', () => {
            // Tell Google to clear the auto-login state
            google.accounts.id.disableAutoSelect();
            
            // Switch the UI View (Hide Dashboard, Show Auth)
            document.getElementById('dashboardWrapper').style.display = 'none';
            document.getElementById('authWrapper').style.display = 'block';
        });

        // JWT Decoder Helper
        function parseJwt (token) {
            var base64Url = token.split('.')[1];
            var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        }

        // Slide Panel Animation Logic
        const registerBtn = document.getElementById('registerBtn');
        const loginBtn = document.getElementById('loginBtn');
        const authWrapper = document.getElementById('authWrapper');

        registerBtn.addEventListener('click', () => authWrapper.classList.add("panel-active"));
        loginBtn.addEventListener('click', () => authWrapper.classList.remove("panel-active"));
    </script>
</body>
</html>
